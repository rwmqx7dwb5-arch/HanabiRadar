# SwiftLint configuration. Intentionally lenient so CI stays green while the
# codebase grows; tighten rules as the app matures.
disabled_rules:
  - todo
  - trailing_comma
  - opening_brace

opt_in_rules:
  - empty_count
  - closure_spacing

excluded:
  - .build
  - HanabiCore/.build
  - DerivedData

line_length:
  warning: 140
  error: 200

identifier_name:
  min_length: 1
  max_length:
    warning: 60
    error: 80

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 120
  error: 200
