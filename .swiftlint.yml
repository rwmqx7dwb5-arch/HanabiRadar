# SwiftLint configuration. Tuned for a math-heavy core: named result tuples and
# aligned matrix literals are intentional, so the corresponding style rules are relaxed.
disabled_rules:
  - todo
  - trailing_comma
  - opening_brace
  - large_tuple        # named 3/4-tuples for basis vectors and ellipse axes are clear
  - comma              # aligned matrix literals use padding after commas

opt_in_rules:
  - empty_count
  - closure_spacing

excluded:
  - .build
  - HanabiCore/.build
  - DerivedData

line_length:
  warning: 160
  error: 240

identifier_name:
  min_length: 1
  max_length:
    warning: 60
    error: 80

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 200
  error: 320

cyclomatic_complexity:
  warning: 15
  error: 25
